<svg xmlns="http://www.w3.org/2000/svg" viewBox="-160 -160 320 320" width="512" height="512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&display=swap');
    </style>
  </defs>

  <!-- White background circle -->
  <circle cx="0" cy="0" r="155" fill="#ffffff" stroke="#1a7a3a" stroke-width="3"/>

  <!-- Outer dashed ring -->
  <circle cx="0" cy="0" r="146" fill="none" stroke="#1a7a3a" stroke-width="1.1" stroke-dasharray="5 3.5"/>

  <!-- Inner ring -->
  <circle cx="0" cy="0" r="138" fill="none" stroke="#2ea84e" stroke-width="0.7"/>

  <!-- Accent dots -->
  <circle cx="0"    cy="-146" r="3.8" fill="#1a7a3a"/>
  <circle cx="0"    cy="146"  r="3.8" fill="#1a7a3a"/>
  <circle cx="-146" cy="0"    r="3.8" fill="#1a7a3a"/>
  <circle cx="146"  cy="0"    r="3.8" fill="#1a7a3a"/>
  <circle cx="103"  cy="-103" r="2.5" fill="#1a7a3a" opacity="0.5"/>
  <circle cx="-103" cy="-103" r="2.5" fill="#1a7a3a" opacity="0.5"/>
  <circle cx="103"  cy="103"  r="2.5" fill="#1a7a3a" opacity="0.5"/>
  <circle cx="-103" cy="103"  r="2.5" fill="#1a7a3a" opacity="0.5"/>

  <!-- Top flourish -->
  <path d="M-22,-118 Q0,-126 22,-118" fill="none" stroke="#1a7a3a" stroke-width="1.3" stroke-linecap="round"/>

  <!-- RV text -->
  <text x="0" y="16"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Cormorant Garamond','Didot','Big Caslon',Georgia,serif"
    font-size="108"
    font-weight="700"
    font-style="italic"
    fill="#1a7a3a"
    letter-spacing="6">RV</text>

  <!-- Divider line -->
  <line x1="-58" y1="62" x2="58" y2="62" stroke="#2ea84e" stroke-width="0.9"/>

  <!-- Tagline -->
  <text x="0" y="82"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia,serif"
    font-size="11.5"
    letter-spacing="4"
    fill="#1a7a3a">GIFT &amp; PRINTING</text>

  <!-- Star accent -->
  <text x="0" y="110" text-anchor="middle" font-size="11" fill="#2ea84e">&#10022;</text>
</svg>